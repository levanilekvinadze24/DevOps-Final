name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: observability-lab-app

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt pytest==8.3.3

      - name: Run unit tests
        working-directory: app
        run: python -m pytest tests/ -v

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Secrets scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r app/requirements.txt --strict

      - name: Dockerfile lint (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/Dockerfile
          failure-threshold: error

      - name: Validate Docker Compose configuration
        run: |
          cp .env.example .env
          docker compose config --quiet

      - name: Infrastructure config scan (Checkov)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: dockerfile,docker_compose
          soft_fail: true
          quiet: true

  build-and-scan:
    name: Build & Container Scan
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Build application image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} ./app

      - name: Container image scan (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

  deploy:
    name: Deploy & Verify
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy stack
        run: |
          cp .env.example .env
          docker compose up -d --build

      - name: Post-deployment validation
        run: |
          chmod +x scripts/validate-environment.sh
          MAX_ATTEMPTS=60 SLEEP_SECONDS=5 ./scripts/validate-environment.sh

      - name: Smoke test API endpoints
        run: |
          curl -sf http://localhost:5000/health
          curl -sf http://localhost:5000/ready
          curl -sf http://localhost:5000/api/data
          curl -sf http://localhost:5000/metrics | grep app_requests_total

      - name: Verify Prometheus scrape target
        run: |
          for i in $(seq 1 12); do
            if curl -sf http://localhost:9090/api/v1/targets | grep -q '"health":"up"'; then
              echo "Prometheus targets healthy"
              exit 0
            fi
            sleep 10
          done
          echo "Prometheus targets not healthy"
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v
