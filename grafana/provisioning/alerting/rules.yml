apiVersion: 1

groups:
  - orgId: 1
    name: observability-lab-alerts
    folder: Observability Lab
    interval: 1m
    rules:
      - uid: high-error-rate-critical
        title: CRITICAL - High Application Error Rate
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: sum(increase(app_errors_total[1m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: []
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [B]
                  reducer:
                    params: []
                    type: last
                  type: query
              expression: A
              reducer: last
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [5]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    params: []
                    type: last
                  type: query
              expression: B
              refId: C
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 1m
        annotations:
          summary: CRITICAL - Application error rate exceeds 5 per minute
          description: >-
            More than 5 application errors were recorded in the last minute.
            Trigger bulk errors with /api/error/bulk?count=10 to simulate.
        labels:
          severity: critical
          service: observability-lab-app
