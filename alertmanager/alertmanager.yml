global:
  resolve_timeout: 5m

route:
  receiver: default-receiver
  group_by: [alertname, severity]
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h

receivers:
  - name: default-receiver

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: [alertname, service]
