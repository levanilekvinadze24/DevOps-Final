global:
  resolve_timeout: 5m

route:
  receiver: default-receiver
  group_by: [alertname, severity, service]
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h
  routes:
    - match:
        severity: critical
      receiver: critical-receiver
      repeat_interval: 30m
    - match:
        severity: warning
      receiver: warning-receiver
      repeat_interval: 2h

receivers:
  - name: default-receiver
  - name: critical-receiver
  - name: warning-receiver

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: [alertname, service]
